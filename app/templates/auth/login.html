{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<!-- Überschrift der Login-Seite -->
<h1>Login</h1>

<!-- Login-Formular -->
<form method="POST">
    {{ form.hidden_tag() }}

    <p>
        <!-- Eingabefeld für die E-Mail -->
        {{ form.email.label }}<br>
        {{ form.email(size=32) }}
    </p>

    <p>
        <!-- Eingabefeld für das Passwort -->
        {{ form.password.label }}<br>
        {{ form.password(size=32) }}
    </p>

    <p>
        <!-- Button zum Absenden des Formulars -->
        {{ form.submit() }}
    </p>
</form>
{% endblock %}
